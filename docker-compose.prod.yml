# Production Docker Compose — uses pre-built images (no source code needed).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Images come from either:
#   - GHCR:    docker compose -f docker-compose.prod.yml pull
#   - Offline: docker load < bioinfoflow-images.tar.gz
#
# Path Contract v3 — identity mount.
# BIOINFOFLOW_HOME is the one path where bioinfoflow data lives. The host
# directory is bind-mounted at the SAME path inside every container, so the
# backend, miniwdl runner, and task containers see identical absolute paths.
# Default is /srv/bioinfoflow (FHS-compliant). Override in .env:
#   BIOINFOFLOW_HOME=/lustre/<user>/bpiper   # HPC
#   BIOINFOFLOW_HOME=/mnt/efs/bpiper          # cloud
#
# Set IMAGE_REGISTRY and IMAGE_TAG in .env to use published images:
#   IMAGE_REGISTRY=ghcr.io/lewismessthecode
#   IMAGE_TAG=latest
#
# The published frontend image is built for localhost:
#   NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
# For a remote/shared server, build from source with docker-compose.yml so the
# frontend bundle bakes in that server's public API URL.

services:
  backend:
    image: ${IMAGE_REGISTRY:+${IMAGE_REGISTRY}/}bioinfoflow-backend:${IMAGE_TAG:-latest}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    environment:
      AUTH_MODE: personal
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
      DATABASE_URL: sqlite+aiosqlite:///${BIOINFOFLOW_HOME:-/srv/bioinfoflow}/state/bioinfoflow.db
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}/state/auth/better-auth.db
      DOCKER_SOCKET: unix:///var/run/docker.sock
      BIOINFOFLOW_GPU_MODE: ${BIOINFOFLOW_GPU_MODE:-auto}
      BIOINFOFLOW_GPU_DEVICES: ${BIOINFOFLOW_GPU_DEVICES:-all}
    volumes:
      - ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}:${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:+${IMAGE_REGISTRY}/}bioinfoflow-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      AUTH_MODE: personal
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}/state/auth/better-auth.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    volumes:
      - ${BIOINFOFLOW_HOME:-/srv/bioinfoflow}:${BIOINFOFLOW_HOME:-/srv/bioinfoflow}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
