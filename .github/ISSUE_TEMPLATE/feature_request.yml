name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Bioinfoflow do?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What would make this done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
