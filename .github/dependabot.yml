version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
