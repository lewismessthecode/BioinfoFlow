name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen --python 3.13

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check i18n coverage
        run: bun run lint:i18n

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          AUTH_LOCAL_ENABLED: "true"
          AUTH_MODE: dev
          AUTH_SELF_SIGNUP_ENABLED: "false"
          BETTER_AUTH_SECRET: ci-better-auth-secret-for-github-actions
          BETTER_AUTH_URL: http://localhost:3000
          BIOINFOFLOW_HOME: /tmp/bioinfoflow
          BIOINFOFLOW_HOME_HOST: /tmp/bioinfoflow
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_AUTH_LOCAL_ENABLED: "true"
          NEXT_PUBLIC_AUTH_MODE: dev
          NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED: "false"

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: false
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
            NEXT_PUBLIC_AUTH_MODE=dev
            NEXT_PUBLIC_AUTH_LOCAL_ENABLED=true
            NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED=false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
