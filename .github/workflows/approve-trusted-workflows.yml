name: Approve Trusted Workflows

on:
  workflow_run:
    workflows:
      - CI
      - CodeQL
    types:
      - completed

permissions:
  actions: write
  contents: read

concurrency:
  group: approve-trusted-workflow-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  approve:
    name: approve
    if: >-
      github.event.workflow_run.conclusion == 'action_required' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.actor.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - name: Approve trusted same-repository run
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/approve"
