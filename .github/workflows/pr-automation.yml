name: PR Automation

on:
  push:
    branches-ignore:
      - main
      - "dependabot/**"
      - "renovate/**"
      - "tmp/**"
      - "wip/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: open-pr
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create or update pull request
        run: |
          branch="$GITHUB_REF_NAME"

          if [ -z "$branch" ]; then
            echo "No branch name was supplied."
            exit 1
          fi

          if [ "$branch" = "main" ]; then
            echo "Skipping main."
            exit 0
          fi

          existing_count="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$branch" \
            --base main \
            --state open \
            --json number \
            --jq 'length')"
          if [ "$existing_count" != "0" ]; then
            echo "A pull request already exists for ${branch}."
            exit 0
          fi

          title="$(printf '%s' "$branch" | sed -E 's#^(codex|feature|fix|bugfix|chore|docs)/##; s#[-_/]+# #g')"
          title="$(printf '%s' "$title" | awk '{for (i=1; i<=NF; i++) $i=toupper(substr($i,1,1)) substr($i,2)} 1')"
          body="$(cat <<BODY
          Automated PR for branch \`$branch\`.

          CI will run against this commit. Keep pushing to the same worktree branch to update this PR.

          Add the \`automerge\` label after review if you want GitHub to squash-merge it automatically once required checks pass.
          BODY
          )"

          create_output="$(mktemp)"
          set +e
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "$body" >"$create_output" 2>&1
          create_status=$?
          set -e
          cat "$create_output"

          if [ "$create_status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "not permitted to create or approve pull requests" "$create_output"; then
            echo "::warning::GitHub Actions is not permitted to create pull requests in this repository. Create the PR manually or enable this permission in repository settings."
            exit 0
          fi

          exit "$create_status"
