name: PR Automation

on:
  push:
    branches-ignore:
      - main
      - "dependabot/**"
      - "renovate/**"
      - "tmp/**"
      - "wip/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: open-pr
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create or update pull request
        run: |
          set -euo pipefail

          branch="$GITHUB_REF_NAME"
          allowed_types="feat|fix|docs|refactor|test|chore|perf|ci"

          if [ -z "$branch" ]; then
            echo "No branch name was supplied."
            exit 1
          fi

          if [ "$branch" = "main" ]; then
            echo "Skipping main."
            exit 0
          fi

          commit_subject="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}" --jq '.commit.message' | sed -n '1p')"

          infer_type() {
            subject_lower="${1,,}"
            branch_lower="${2,,}"
            branch_topic="$(printf '%s' "$branch_lower" | sed -E 's#^(codex|feature|fix|bugfix|chore|docs|test|refactor|perf|ci)/##')"
            first_word="${subject_lower%% *}"

            case "$subject_lower" in
              feat:*|feat\(*|feature:*) echo "feat"; return ;;
              fix:*|fix\(*|bugfix:*) echo "fix"; return ;;
              docs:*|docs\(*) echo "docs"; return ;;
              refactor:*|refactor\(*) echo "refactor"; return ;;
              test:*|test\(*) echo "test"; return ;;
              chore:*|chore\(*) echo "chore"; return ;;
              perf:*|perf\(*) echo "perf"; return ;;
              ci:*|ci\(*) echo "ci"; return ;;
            esac

            case "$first_word" in
              add|adds|added|feat|feature) echo "feat"; return ;;
              fix|fixes|fixed|bugfix) echo "fix"; return ;;
              doc|docs|document|documents) echo "docs"; return ;;
              refactor|refactors|refactored|refractor) echo "refactor"; return ;;
              test|tests|tested) echo "test"; return ;;
              perf|performance|optimize|optimizes|optimized) echo "perf"; return ;;
              ci|workflow|workflows) echo "ci"; return ;;
            esac

            case "$branch_topic" in
              ci*) echo "ci"; return ;;
              docs*) echo "docs"; return ;;
              fix*|bugfix*) echo "fix"; return ;;
              refactor*|refractor*) echo "refactor"; return ;;
              test*) echo "test"; return ;;
              perf*) echo "perf"; return ;;
              chore*) echo "chore"; return ;;
              feat*|feature*) echo "feat"; return ;;
            esac

            echo "chore"
          }

          normalize_summary() {
            raw="$1"
            if [ -z "$raw" ]; then
              raw="$branch"
            fi

            summary="$(printf '%s' "$raw" \
              | sed -E "s#^(${allowed_types})(\\([^)]+\\))?:[[:space:]]*##I; s#^(codex|feature|fix|bugfix|chore|docs|test|refactor|perf|ci)/##; s#[-_/]+# #g; s#[[:space:]]+# #g; s#^[[:space:]]+##; s#[[:space:]]+$##")"

            if [ -z "$summary" ]; then
              summary="$(printf '%s' "$branch" \
                | sed -E 's#^(codex|feature|fix|bugfix|chore|docs|test|refactor|perf|ci)/##; s#[-_/]+# #g; s#[[:space:]]+# #g; s#^[[:space:]]+##; s#[[:space:]]+$##')"
            fi

            first="${summary:0:1}"
            rest="${summary:1}"
            printf '%s%s' "${first,,}" "$rest"
          }

          if printf '%s' "$commit_subject" | grep -Eq "^(${allowed_types})(\\([^)]+\\))?: .+"; then
            title="$commit_subject"
          else
            type="$(infer_type "$commit_subject" "$branch")"
            summary="$(normalize_summary "$commit_subject")"
            title="${type}: ${summary}"
          fi

          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$branch" \
            --base main \
            --state open \
            --json number,title \
            --jq '.[0] // empty')"

          if [ -n "$existing_pr" ]; then
            existing_number="$(printf '%s' "$existing_pr" | jq -r '.number')"
            existing_title="$(printf '%s' "$existing_pr" | jq -r '.title')"

            if [ "$existing_title" != "$title" ]; then
              edit_output="$(mktemp)"
              set +e
              gh pr edit "$existing_number" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$title" >"$edit_output" 2>&1
              edit_status=$?
              set -e
              cat "$edit_output"

              if [ "$edit_status" -ne 0 ]; then
                if grep -q "not permitted" "$edit_output"; then
                  echo "::warning::GitHub Actions is not permitted to update pull request titles in this repository."
                  exit 0
                fi

                exit "$edit_status"
              fi

              echo "Updated pull request #${existing_number} title to: ${title}"
            else
              echo "A pull request already exists for ${branch}; title is already normalized."
            fi

            exit 0
          fi

          body="$(cat <<BODY
          Automated PR for branch \`$branch\`.

          CI will run against this commit. Keep pushing to the same worktree branch to update this PR.

          Add the \`automerge\` label after review if you want GitHub to squash-merge it automatically once required checks pass.
          BODY
          )"

          create_output="$(mktemp)"
          set +e
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body "$body" >"$create_output" 2>&1
          create_status=$?
          set -e
          cat "$create_output"

          if [ "$create_status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "not permitted to create or approve pull requests" "$create_output"; then
            echo "::warning::GitHub Actions is not permitted to create pull requests in this repository. Create the PR manually or enable this permission in repository settings."
            exit 0
          fi

          exit "$create_status"
