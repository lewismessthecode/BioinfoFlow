name: Container Release

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      publish_images:
        description: "Choose whether to publish container images."
        required: false
        default: force
        type: string
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Choose whether to publish container images."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - force
          - skip

permissions:
  contents: read
  packages: write

concurrency:
  group: container-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: detect image changes
    runs-on: ubuntu-latest
    outputs:
      publish_backend: ${{ steps.changes.outputs.publish_backend }}
      publish_frontend: ${{ steps.changes.outputs.publish_frontend }}
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}
      frontend_localhost_image: ${{ steps.images.outputs.frontend_localhost }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect image changes
        id: changes
        env:
          REQUESTED_PUBLISH: ${{ inputs.publish_images || github.event.inputs.publish_images || 'auto' }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          publish_backend="false"
          publish_frontend="false"

          case "$REQUESTED_PUBLISH" in
            force)
              publish_backend="true"
              publish_frontend="true"
              ;;
            skip)
              publish_backend="false"
              publish_frontend="false"
              ;;
            auto)
              if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
                publish_backend="true"
                publish_frontend="true"
              elif [ -z "${BEFORE_SHA:-}" ] || printf '%s' "$BEFORE_SHA" | grep -Eq '^0+$'; then
                publish_backend="true"
                publish_frontend="true"
              else
                changed_files="$(mktemp)"
                git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" > "$changed_files"

                if grep -Eq '^backend/' "$changed_files"; then
                  publish_backend="true"
                fi

                if grep -Eq '^frontend/' "$changed_files"; then
                  publish_frontend="true"
                fi

                if grep -Eq '^(docker-compose\.local\.yml|\.github/workflows/(container-release|release)\.yml)$' "$changed_files"; then
                  publish_backend="true"
                  publish_frontend="true"
                fi
              fi
              ;;
            *)
              echo "Unknown publish_images value: $REQUESTED_PUBLISH"
              exit 2
              ;;
          esac

          {
            echo "publish_backend=$publish_backend"
            echo "publish_frontend=$publish_frontend"
          } >> "$GITHUB_OUTPUT"

          echo "publish_backend=$publish_backend"
          echo "publish_frontend=$publish_frontend"

      - name: Set image names
        id: images
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          {
            echo "backend=ghcr.io/${owner}/bioinfoflow-backend"
            echo "frontend=ghcr.io/${owner}/bioinfoflow-frontend"
            echo "frontend_localhost=ghcr.io/${owner}/bioinfoflow-frontend-localhost"
          } >> "$GITHUB_OUTPUT"

  publish-backend:
    name: publish backend
    needs: detect
    if: needs.detect.outputs.publish_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate backend image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect.outputs.backend_image }}
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Publish backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish-frontend:
    name: publish frontend
    needs: detect
    if: needs.detect.outputs.publish_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate authenticated frontend image tags
        id: frontend-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect.outputs.frontend_image }}
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Generate localhost frontend image tags
        id: localhost-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect.outputs.frontend_localhost_image }}
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Publish frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
            NEXT_PUBLIC_AUTH_MODE=personal
            NEXT_PUBLIC_AUTH_LOCAL_ENABLED=true
            NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED=false
          tags: ${{ steps.frontend-metadata.outputs.tags }}
          labels: ${{ steps.frontend-metadata.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Publish localhost frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
            NEXT_PUBLIC_AUTH_MODE=dev
            NEXT_PUBLIC_AUTH_LOCAL_ENABLED=true
            NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED=false
          tags: ${{ steps.localhost-metadata.outputs.tags }}
          labels: ${{ steps.localhost-metadata.outputs.labels }}
          cache-from: type=gha,scope=frontend-localhost
          cache-to: type=gha,mode=max,scope=frontend-localhost

  skip-publish:
    name: skip publish
    needs: detect
    if: needs.detect.outputs.publish_backend != 'true' && needs.detect.outputs.publish_frontend != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish
        run: echo "No backend/ or frontend/ changes detected; container images were not republished."
