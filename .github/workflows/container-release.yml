name: Container Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Choose whether to publish container images."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - force
          - skip

permissions:
  contents: read
  packages: write

concurrency:
  group: container-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect image changes
        id: changes
        env:
          REQUESTED_PUBLISH: ${{ github.event.inputs.publish_images || 'auto' }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          publish="false"

          case "$REQUESTED_PUBLISH" in
            force)
              publish="true"
              ;;
            skip)
              publish="false"
              ;;
            auto)
              if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
                publish="true"
              elif [ -z "$BEFORE_SHA" ] || printf '%s' "$BEFORE_SHA" | grep -Eq '^0+$'; then
                publish="true"
              else
                changed_files="$(mktemp)"
                git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" > "$changed_files"
                if grep -Eq '^(backend|frontend)/' "$changed_files"; then
                  publish="true"
                fi
              fi
              ;;
            *)
              echo "Unknown publish_images value: $REQUESTED_PUBLISH"
              exit 2
              ;;
          esac

          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Set image names
        id: images
        if: steps.changes.outputs.publish == 'true'
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          {
            echo "backend=ghcr.io/${owner}/bioinfoflow-backend"
            echo "frontend=ghcr.io/${owner}/bioinfoflow-frontend"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.changes.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend image
        if: steps.changes.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:main
            ${{ steps.images.outputs.backend }}:sha-${{ steps.images.outputs.short_sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Publish frontend image
        if: steps.changes.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
            NEXT_PUBLIC_AUTH_MODE=personal
            NEXT_PUBLIC_AUTH_LOCAL_ENABLED=true
            NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED=false
          tags: |
            ${{ steps.images.outputs.frontend }}:latest
            ${{ steps.images.outputs.frontend }}:main
            ${{ steps.images.outputs.frontend }}:sha-${{ steps.images.outputs.short_sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Skip publish
        if: steps.changes.outputs.publish != 'true'
        run: echo "No backend/ or frontend/ changes detected; container images were not republished."
