services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/lewismessthecode}/bioinfoflow-backend:${BIOINFOFLOW_VERSION:?Set BIOINFOFLOW_VERSION to a release tag}
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      AUTH_MODE: dev
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
      DATABASE_URL: sqlite+aiosqlite:///${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}/state/bioinfoflow.db
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}/state/auth/better-auth.db
      CORS_ORIGINS: '["http://localhost:${FRONTEND_PORT:-3000}","http://127.0.0.1:${FRONTEND_PORT:-3000}"]'
      TRUSTED_HOSTS: '["localhost","127.0.0.1"]'
      DOCKER_SOCKET: unix:///var/run/docker.sock
    volumes:
      - type: bind
        source: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
        target: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
      - type: bind
        source: ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
        target: /var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/ping')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/lewismessthecode}/bioinfoflow-frontend-localhost:${BIOINFOFLOW_VERSION:?Set BIOINFOFLOW_VERSION to a release tag}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      AUTH_MODE: dev
      NEXT_PUBLIC_AUTH_MODE: dev
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}/state/auth/better-auth.db
      BETTER_AUTH_URL: http://localhost:${FRONTEND_PORT:-3000}
    volumes:
      - type: bind
        source: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
        target: ${BIOINFOFLOW_HOME:?Set BIOINFOFLOW_HOME to an absolute host path}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
