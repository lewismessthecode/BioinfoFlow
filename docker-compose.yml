# Path Contract v3 — identity mount.
# The host directory pointed to by BIOINFOFLOW_HOME is bind-mounted into every
# container at the SAME path. That lets backend, miniwdl runner, and every
# task container see identical absolute paths, removing every host↔container
# translation layer from the codebase.
#
# Default is ${PWD}/data for local development. On Linux servers / HPC / cloud,
# set BIOINFOFLOW_HOME in .env to a path that exists on your host, e.g.:
#   BIOINFOFLOW_HOME=/srv/bioinfoflow
#   BIOINFOFLOW_HOME=/lustre/<user>/bpiper
#   BIOINFOFLOW_HOME=/Users/<you>/bpiper-data
services:
  backend:
    image: bioinfoflow-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    environment:
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-${PWD}/data}
      DATABASE_URL: sqlite+aiosqlite:///${BIOINFOFLOW_HOME:-${PWD}/data}/state/bioinfoflow.db
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-${PWD}/data}/state/auth/better-auth.db
      DOCKER_SOCKET: unix:///var/run/docker.sock
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}:${BIOINFOFLOW_HOME:-${PWD}/data}
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: bioinfoflow-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-personal}
        NEXT_PUBLIC_AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
        NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED: ${AUTH_SELF_SIGNUP_ENABLED:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-${PWD}/data}/state/auth/better-auth.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}:${BIOINFOFLOW_HOME:-${PWD}/data}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
