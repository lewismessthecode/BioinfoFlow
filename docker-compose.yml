# Path Contract v3 — identity mount.
# The host directory pointed to by BIOINFOFLOW_HOME is bind-mounted into every
# container at the SAME path. That lets backend, miniwdl runner, and every
# task container see identical absolute paths, removing every host↔container
# translation layer from the codebase.
#
# Default is ${PWD}/data for local development. On Linux servers / HPC / cloud,
# set BIOINFOFLOW_HOME in .env to a path that exists on your host, e.g.:
#   BIOINFOFLOW_HOME=/srv/bioinfoflow
#   BIOINFOFLOW_HOME=/lustre/<user>/bioinfoflow
#   BIOINFOFLOW_HOME=/Users/<you>/bioinfoflow-data
services:
  backend:
    image: bioinfoflow-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      AUTH_MODE: ${AUTH_MODE:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-${PWD}/data}
      DATABASE_URL: sqlite+aiosqlite:///${BIOINFOFLOW_HOME:-${PWD}/data}/state/bioinfoflow.db
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-${PWD}/data}/state/auth/better-auth.db
      DOCKER_SOCKET: unix:///var/run/docker.sock
      BIOINFOFLOW_GPU_MODE: ${BIOINFOFLOW_GPU_MODE:-auto}
      BIOINFOFLOW_GPU_DEVICES: ${BIOINFOFLOW_GPU_DEVICES:-all}
      ASR_PROVIDER: ${ASR_PROVIDER:-}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      ASR_API_KEY: ${ASR_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-zh}
      ASR_CONTEXT_TERMS: ${ASR_CONTEXT_TERMS:-["Bioinfoflow","Nextflow","MiniWDL","FASTQ"]}
    # The agent bash tool can be OS-sandboxed with bubblewrap (AGENT_SANDBOX_ENABLED=true).
    # bwrap inside Docker needs an unprivileged user namespace; if the host
    # restricts that, add `security_opt: ["seccomp:unconfined"]` (and/or
    # `apparmor:unconfined`) to this service. The sandbox is OFF by default, so
    # leaving this unset does not affect existing deployments.
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}:${BIOINFOFLOW_HOME:-${PWD}/data}
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: bioinfoflow-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-}
        NEXT_PUBLIC_AUTH_ENABLED: ${AUTH_ENABLED:-false}
        NEXT_PUBLIC_AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
        NEXT_PUBLIC_AUTH_SELF_SIGNUP_ENABLED: ${AUTH_SELF_SIGNUP_ENABLED:-false}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      AUTH_MODE: ${AUTH_MODE:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      BIOINFOFLOW_HOME: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BIOINFOFLOW_HOME_HOST: ${BIOINFOFLOW_HOME:-${PWD}/data}
      BETTER_AUTH_DB_PATH: ${BIOINFOFLOW_HOME:-${PWD}/data}/state/auth/better-auth.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}:${BIOINFOFLOW_HOME:-${PWD}/data}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  asr-funasr:
    profiles: ["voice-funasr"]
    gpus: all
    build:
      context: ./deploy/voice/funasr
    environment:
      ASR_MODEL: ${ASR_MODEL:-FunAudioLLM/Fun-ASR-Nano-2512}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      MODELSCOPE_CACHE: /models/modelscope
      HF_HOME: /models/huggingface
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}/models/asr:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  asr-whisper:
    profiles: ["voice-whisper"]
    build:
      context: ./deploy/voice/whisper
    environment:
      ASR_MODEL: ${ASR_MODEL:-large-v3-turbo}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      HF_HOME: /models/huggingface
    volumes:
      - ${BIOINFOFLOW_HOME:-${PWD}/data}/models/asr:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
